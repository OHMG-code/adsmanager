services:
  validation_app:
    image: crm-app
    command:
      - /bin/bash
      - -lc
      - |
        mkdir -p /var/www/html/storage/mail_attachments \
          /var/www/html/storage/logs \
          /var/www/html/storage/audio \
          /var/www/html/storage/docs \
          /var/www/html/storage/locks
        if [ -f /var/www/html/composer.lock ]; then
          if [ ! -f /var/www/html/vendor/autoload.php ] || [ ! -f /var/www/html/vendor/phpmailer/phpmailer/src/PHPMailer.php ]; then
            composer install --no-interaction --prefer-dist --no-progress || true
          fi
        fi
        chgrp -R www-data /var/www/html/storage 2>/dev/null || true
        chmod -R ug+rwX,o+rX /var/www/html/storage 2>/dev/null || true
        exec apache2-foreground
    ports:
      - "${VALIDATION_APP_PORT:-8081}:80"
    volumes:
      - ${VALIDATION_REPO_ROOT}:/var/www/html
      - ${VALIDATION_STORAGE_DIR}:/var/www/html/storage
      - ${VALIDATION_DB_LOCAL_PATH}:/var/www/html/config/db.local.php:ro
      - ${VALIDATION_MIGRATIONS_DIR}:/var/www/html/sql/migrations:ro
      - ${VALIDATION_REPO_ROOT}/docker/apache/000-default.conf:/etc/apache2/sites-enabled/000-default.conf:ro
      - ${VALIDATION_REPO_ROOT}/php/conf.d/99-dev.ini:/usr/local/etc/php/conf.d/99-dev.ini:ro
      - ${VALIDATION_REPO_ROOT}/php/conf.d/99-xdebug.ini:/usr/local/etc/php/conf.d/99-xdebug.ini:ro
    environment:
      APP_ENV: dev
      TZ: Europe/Warsaw
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${VALIDATION_DB_NAME:-crm_validation}
      DB_USERNAME: ${VALIDATION_DB_USER:-crm}
      DB_PASSWORD: ${VALIDATION_DB_PASS:-crm}
      MIGRATOR_TOKEN: ${VALIDATION_MIGRATOR_TOKEN:-validation-migrator-token}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
