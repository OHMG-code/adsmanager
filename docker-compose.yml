services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm_app
    ports:
      - "8080:80"
    volumes:
      # projekt
      - ./:/var/www/html
      - ./docker/apache/000-default.conf:/etc/apache2/sites-enabled/000-default.conf:ro
      # vendor jako osobny wolumen (unikasz konfliktów z bind-mount)
      - vendor:/var/www/html/vendor
    environment:
      APP_ENV: dev
      TZ: Europe/Warsaw

      # DB (weźmie z .env jeśli dodasz)
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-crm_dev}
      DB_USERNAME: ${DB_USERNAME:-crm}
      DB_PASSWORD: ${DB_PASSWORD:-crm}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mariadb:10.11
    container_name: crm_db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-crm_dev}
      MYSQL_USER: ${DB_USERNAME:-crm}
      MYSQL_PASSWORD: ${DB_PASSWORD:-crm}
      TZ: Europe/Warsaw
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
      # opcjonalnie: init.sql (jeśli chcesz autoimport)
      # - ./docker/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  # odpalasz tylko gdy potrzebujesz: docker compose --profile tools up -d
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: crm_pma
    profiles: ["tools"]
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 256M
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  dbdata:
  vendor:

